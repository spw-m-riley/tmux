# vim: set ft=tmux tw=0 nowrap

setenv -g TMUX_PLUGIN_MANAGER_PATH ~/.tmux/plugins

# Change prefix key
unbind C-b
set -g prefix C-a
set -g prefix2 C-b
bind-key -r C-a send-prefix
bind-key -r C-b send-prefix -2

# Set some key bindings
## Pane management
bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key b break-pane -d
bind-key t split-window -h -f -p 20 -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

## Window management
bind-key c new-window -c "#{pane_current_path}"

## Session management
# Sessions (tmux-fzf if installed; fallback to choose-tree)
bind-key s if-shell -b '[ -x "#{HOME}/.tmux/plugins/tmux-fzf/scripts/session.sh" ]' \
  'run-shell -b "#{HOME}/.tmux/plugins/tmux-fzf/scripts/session.sh switch"' \
  'choose-tree -s'
bind-key S if-shell -b '[ -x "#{HOME}/.tmux/plugins/tmux-fzf/scripts/session.sh" ]' \
  'run-shell -b "#{HOME}/.tmux/plugins/tmux-fzf/scripts/session.sh"' \
  'choose-tree -s'


# Reload tmux config
bind-key r source-file ~/.tmux.conf \; display " 󰑓 Tmux Conf #[bold,italics]Reloaded#[noitalics]!"

bind P paste-buffer

# Set terminal colours
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "xterm-256color"'
set -ga terminal-overrides ",tmux-256color:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g focus-events on

set -s escape-time 1

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'sainnhe/tmux-fzf' # Comprehensive fzf integration
set -g @plugin 'tmux-plugins/tmux-copycat' # Regex search and highlights in panes
set -g @plugin 'laktak/extrakto' # Fuzzy select text from pane output
set -g @plugin 'tmux-plugins/tmux-open' # Open highlighted file paths or URLs
set -g @plugin 'tmux-plugins/tmux-yank' # Improved clipboard handling (works with system clipboard)
set -g @plugin 'tmux-plugins/tmux-battery' # Statusline battery module
set -g @plugin 'tmux-plugins/tmux-cpu' # Statusline CPU/RAM module

# Catppuccin theme
set -g @catppuccin_status_default "on"
set -g @catppuccin_status_background "#{@thm_bg}"
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_current_background "#{@thm_mauve}"
set -g status-position top
set -g status-left ""
set -gF status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}#{E:@catppuccin_status_battery}"


# Configuration for tmux-fzf
# Use prefix + f for tmux-fzf.
# Note: TMUX_FZF_LAUNCH_KEY should be set before loading the plugin if not using default.
# However, the plugin's README says to add to ~/.tmux.conf, implying it's read at source time.
# We'll add the variable and also the plugin line. If issues, might need to place var earlier or rely on its default detection.
setenv -g TMUX_FZF_LAUNCH_KEY "f" # Use prefix + f for tmux-fzf main launcher
# For fzf pop-up window options (tmux >= 3.2)
# Prompt uses a thin space (U+2009) to avoid shell splitting.
setenv -g TMUX_FZF_OPTIONS "-p -w 75% -h 90% -m --prompt=󰄛  --pointer="

# Configuration for extrakto
set -g @extrakto_split_direction "p"
set -g @extrakto_popup_size "75%,90%"



setw -g mode-keys vi
setw -g mouse on
setw -g monitor-activity on

set-option -g base-index 1
set-option -g renumber-windows on
set -g history-limit 10000

set -g visual-bell off
set -g visual-silence off
set -g visual-activity off
set -g bell-action none
set -gq allow-passthrough on


# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version >= 3.2" | bc)" = 1 ]' \
    "set -g set-clipboard on"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-s' send-keys -X cancel

# Vi-style copy-mode-vi selection/yank
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel

# Update environment from client
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY PATH"

run '~/.tmux/plugins/tpm-redux/tpm'
